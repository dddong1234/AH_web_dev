services:
  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    entrypoint: >
      sh -c "uv run alembic upgrade head &&
      uv run python scripts/seed_admin.py &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DB_USER: ${DB_USER:-ai_health}
      DB_PASSWORD: ${DB_PASSWORD:-password1234}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-ai_health}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-before-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
    volumes:
      - uploads_volume:/app/uploads
      - media_volume:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    volumes:
      - mysql_volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-password1234}
      MYSQL_DATABASE: ${DB_NAME:-ai_health}
      MYSQL_USER: ${DB_USER:-ai_health}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password1234}
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 5


volumes:
  mysql_volume:
  media_volume:
  uploads_volume:
